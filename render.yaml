# Render Infrastructure as Code — three-service deployment
# Equivalent to `docker compose up` but on Render.
#
# Deploy:
#   1. Push this file to your repo (master branch).
#   2. In the Render dashboard → New → Blueprint → connect this repo.
#   3. Render reads this file and creates all three services automatically.
#
# After the first deploy:
#   - Copy the blog-frontend URL and set it as FRONTEND_URL in blog-backend's
#     environment tab (required for CORS).
#   - NEXT_PUBLIC_API_URL is already set to https://blog-backend.onrender.com
#     and is baked into the Next.js build automatically — no manual step needed
#     unless you rename the backend service.

databases:
  - name: blog-db
    databaseName: blog_db
    user: blog_user
    plan: free
    region: oregon

services:

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: blog-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    envVars:
      # Render injects the managed-DB connection string automatically.
      # Our _async_db_url() in db.py normalises it to postgresql+asyncpg://
      - key: DATABASE_URL
        fromDatabase:
          name: blog-db
          property: connectionString
      # Auto-generated 32-character secret for JWT signing.
      - key: SECRET
        generateValue: true
      # Set this to the blog-frontend URL after the first deploy.
      - key: FRONTEND_URL
        sync: false

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  # Uses Render's native Node.js environment (not Docker) so that env vars
  # are available at build time and NEXT_PUBLIC_API_URL is baked into the bundle.
  - type: web
    name: blog-frontend
    env: node
    rootDir: ./frontend
    buildCommand: npm ci && npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public
    startCommand: node .next/standalone/server.js
    plan: free
    region: oregon
    envVars:
      # Available at build time — baked into the Next.js client bundle.
      # Update this if you rename the blog-backend service.
      - key: NEXT_PUBLIC_API_URL
        value: https://blog-backend.onrender.com
      - key: NODE_ENV
        value: production
