; Supervises the three long-running processes inside the consolidated image:
;   1. backend  -- uvicorn on 127.0.0.1:8000
;   2. frontend -- Next.js standalone server on 127.0.0.1:3000
;   3. nginx    -- public-facing reverse proxy on $PORT
;
; Migrations (alembic) and nginx config rendering happen in /deploy/start.sh
; before supervisord takes over.

[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/run/supervisord.pid

[program:backend]
command=/app/backend/.venv/bin/uvicorn app.app:app --host 127.0.0.1 --port 8000 --workers 1
directory=/app/backend
autostart=true
autorestart=true
startretries=3
stopsignal=TERM
stopwaitsecs=15
priority=10
environment=PYTHONUNBUFFERED="1"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:frontend]
command=node /app/frontend/server.js
directory=/app/frontend
autostart=true
autorestart=true
startretries=3
stopsignal=TERM
stopwaitsecs=15
priority=20
environment=HOSTNAME="127.0.0.1",PORT="3000",NODE_ENV="production"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=/usr/sbin/nginx -c /etc/nginx/nginx.conf
autostart=true
autorestart=true
startretries=3
stopsignal=QUIT
stopwaitsecs=10
priority=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
